name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"

  # Manual trigger
  workflow_dispatch:

  # Only run when README or workflow changes
  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - ".github/workflows/metrics.yml"

# Prevent overlapping runs
concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # User
          user: TimyVillarmia

          # Template
          template: classic
          base: header, activity, community, repositories, metadata

          # Timezone
          config_timezone: Asia/Manila

          # Languages plugin
          plugin_languages: yes

          # Faster analysis
          plugin_languages_analysis_timeout: 10
          plugin_languages_analysis_timeout_repositories: 5

          # Cleaner categories
          plugin_languages_categories: programming

          # Ignore generated/web styling languages
          plugin_languages_ignored: >
            html, css, scss, sass, less

          # Recent activity
          plugin_languages_recent_categories: programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 200

          # Better sections
          plugin_languages_sections: most-used

          # Hide tiny percentages
          plugin_languages_threshold: 1%

          # Commit behavior
          committer_branch: main
          committer_message: "chore: update github metrics"

          # Output file
          filename: github-metrics.svg
