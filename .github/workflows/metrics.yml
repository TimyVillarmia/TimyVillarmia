name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - ".github/workflows/metrics.yml"

# Prevent overlapping runs
concurrency:
  group: github-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Identity
          user: TimyVillarmia

          # Layout
          template: classic
          base: header, activity, repositories, metadata

          # Performance / stability
          config_timezone: Asia/Manila
          output_action: commit

          # Languages plugin
          plugin_languages: yes
          plugin_languages_analysis_timeout: 8
          plugin_languages_analysis_timeout_repositories: 3

          plugin_languages_categories: markup, programming
          plugin_languages_sections: most-used

          plugin_languages_ignored: |
            html
            css
            scss
            sass
            less

          plugin_languages_limit: 8

          plugin_languages_recent: yes
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_recent_categories: markup, programming

          plugin_languages_threshold: 0%

          # Reduce noise
          repositories_forks: no
          repositories_affiliations: owner, collaborator

          # Commit behavior
          committer_branch: main
          committer_message: "chore: update github metrics"

          # Output
          filename: github-metrics.svg
