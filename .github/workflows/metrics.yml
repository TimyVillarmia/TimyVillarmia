name: Metrics

on:
  # Schedule updates (Twice a day instead of every hour to save action minutes)
  schedule:
    - cron: "0 0  * * *"
  # Manual trigger
  workflow_dispatch:
  # Run on push to main branches
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub Metrics
        # Pinning to a specific major version (v3) prevents unexpected breaking changes
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Identity
          user: TimyVillarmia

          # Layout
          template: classic
          base: header, activity, community, repositories, metadata

          # Configuration
          config_timezone: Asia/Manila
          config_rc_dieonerrors: yes # Fails the workflow early if an error occurs, making it easier to debug

          # Languages Plugin
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5

          plugin_languages_categories: markup, programming
          plugin_languages_colors: github

          # Cleaned up ignored languages and set a sensible limit
          plugin_languages_ignored: html, css, scss, sass, less, json, yaml, markdown
          plugin_languages_limit: 8

          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300

          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
